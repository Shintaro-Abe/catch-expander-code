name: Build and Push Agent Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/agent/**"
      - "src/observability/**"
      - ".github/workflows/build-agent.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: catch-expander-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::417338593075:role/GitHubActionsCatchExpanderRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ECR は IMMUTABLE 設定 (template.yaml の AgentRepository) のため `latest` タグは
      # 上書き push できず CI が必ず失敗する。SHA タグのみで運用する (sam deploy も
      # AgentImageUri に full SHA を指定する経路、template.yaml:562 で latest 廃止済み)。
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/agent/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
