  # ==============================================================
  # Frontend Static Hosting (S3 + CloudFront + OAC)
  # ==============================================================

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub catch-expander-frontend-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: catch-expander-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""  # OAC を使うため OAI は空
            OriginAccessControlId: !GetAtt FrontendOAC.Id
          - Id: ApiOrigin
            DomainName: !Sub ${DashboardApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: redirect-to-https
            # Cookie(session)を API Gateway へ転送するため AllViewerExceptHostHeader
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad         # Managed-CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # Managed-AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]
        CustomErrorResponses:
          # SPA ルーティング: S3 の 404 を index.html で受ける
          # 403 は API Gateway の認証エラーと衝突するため除外
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

Conditions:
  HasAgentImageUri: !Not [!Equals [!Ref AgentImageUri, ""]]

Outputs:
  SlackApiUrl:
    Description: API Gateway endpoint URL for Slack events
    Value: !Sub https://${SlackApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/slack/events

  AgentRepositoryUri:
    Description: ECR repository URI for agent container image
    Value: !GetAtt AgentRepository.RepositoryUri

  AgentClusterArn:
    Description: ECS cluster ARN
    Value: !GetAtt AgentCluster.Arn

  AgentTaskDefinitionArn:
    Description: ECS task definition ARN
    Value: !Ref AgentTaskDefinition

  FrontendBucketName:
    Description: S3 bucket name for frontend static assets (used by CI sync)
    Value: !Ref FrontendBucket

  FrontendDistributionId:
    Description: CloudFront distribution ID (used for cache invalidation)
    Value: !Ref FrontendDistribution

  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub https://${FrontendDistribution.DomainName}
